<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crowd-Funding Platform</title>
    <!-- Inter Font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                    colors: {
                        primary: '#2563EB',
                        secondary: '#10B981',
                        surface: '#FFFFFF',
                        background: '#F9FAFB',
                        slate: '#111827',
                        muted: '#6B7280',
                        danger: '#EF4444',
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #F9FAFB; color: #111827; }
        .glassmorphism {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.3);
        }
    </style>
</head>
<body class="min-h-screen bg-background flex flex-col">

    <!-- Fixed Top Navigation -->
    <nav class="fixed top-0 w-full z-50 glassmorphism">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16 items-center">
                <!-- Branding & Main Nav -->
                <div class="flex items-center">
                    <a href="{% url 'home' %}" class="text-2xl font-bold text-primary">Fundit</a>
                    <div class="hidden md:block ml-10">
                        <div class="flex items-baseline space-x-4">
                            <a href="{% url 'projects:list' %}" class="px-3 py-2 rounded-md text-sm font-medium text-slate hover:text-primary">Campaigns</a>
                        </div>
                    </div>
                </div>
                
                <!-- User/Auth Links -->
                <div class="flex-1 flex items-center justify-end ml-4">
                    {% if user.is_authenticated %}
                        <div class="flex space-x-4 items-center">
                            <a href="#" class="text-sm text-muted hover:text-slate">My Profile ({{ user.first_name }} {{ user.last_name }})</a>
                            <form action="{% url 'accounts:logout' %}" method="POST" class="inline">
                                {% csrf_token %}
                                <button type="submit" class="text-sm font-medium text-danger hover:text-red-700">Logout</button>
                            </form>
                        </div>
                    {% else %}
                        <div class="flex space-x-4">
                            <a href="{% url 'accounts:login' %}" class="px-4 py-2 border border-transparent rounded-md text-sm font-medium text-white bg-primary hover:bg-blue-700">Login</a>
                            <a href="{% url 'accounts:register' %}" class="px-4 py-2 border border-primary rounded-md text-sm font-medium text-primary hover:bg-blue-50">Register</a>
                        </div>
                    {% endif %}
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="flex-1 w-full max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 mt-24 mb-12">
        {% if messages %}
            <div class="mb-6 space-y-2">
                {% for message in messages %}
                    <div class="p-4 rounded-md {% if message.tags == 'success' %}bg-green-100 text-green-800{% elif message.tags == 'error' %}bg-red-100 text-red-800{% else %}bg-blue-100 text-blue-800{% endif %}">
                        {{ message }}
                    </div>
                {% endfor %}
            </div>
        {% endif %}
        
        {% block content %}{% endblock %}
    </main>

</body>
</html>
